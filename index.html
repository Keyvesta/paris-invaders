<html lang="fr">
<head>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>

<style>
:root{--bg:#0a0a0f;--panel:#0f0f1a;--border:#1a1a2e;--ok:#00ff88;--damaged:#ffaa00;--destroyed:#ff3355;--hidden:#8888ff;--text:#c8c8e8;--accent:#00ffcc}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px;transition:opacity .4s}
#splash-title{font-family:'Orbitron',monospace;font-weight:900;font-size:28px;color:var(--accent);text-shadow:0 0 30px rgba(0,255,204,.6);letter-spacing:4px;animation:pulse 2s infinite}
#splash-title s{color:#ff3355;text-decoration:none}
@keyframes pulse{0%,100%{text-shadow:0 0 20px rgba(0,255,204,.4)}50%{text-shadow:0 0 50px rgba(0,255,204,.9)}}
#splash-bar-bg{width:280px;height:2px;background:#1a1a2e;border-radius:1px;overflow:hidden}
#splash-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--ok),var(--accent));transition:width .3s ease}
#splash-msg{font-size:11px;color:#444;letter-spacing:2px}
#splash-msg::after{content:'_';animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
/* HEADER */
#hd{background:var(--panel);border-bottom:1px solid var(--border);padding:7px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;z-index:1000;flex-shrink:0}
#tt{font-family:'Orbitron',monospace;font-weight:900;font-size:13px;color:var(--accent);letter-spacing:2px;white-space:nowrap}
#tt s{color:#ff3355;text-decoration:none}
#st{display:flex;gap:5px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:4px;font-size:10px;padding:3px 6px;border-radius:3px;border:1px solid;cursor:pointer;transition:all .2s;user-select:none;white-space:nowrap}
.stat.off{opacity:.2}
.ok{color:var(--ok);border-color:var(--ok)}.ok.on{background:rgba(0,255,136,.1)}
.dm{color:var(--damaged);border-color:var(--damaged)}.dm.on{background:rgba(255,170,0,.1)}
.ds{color:var(--destroyed);border-color:var(--destroyed)}.ds.on{background:rgba(255,51,85,.1)}
.hd{color:var(--hidden);border-color:var(--hidden)}.hd.on{background:rgba(136,136,255,.1)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ok .dot{background:var(--ok)}.dm .dot{background:var(--damaged)}.ds .dot{background:var(--destroyed)}.hd .dot{background:var(--hidden)}
#rg{display:flex;align-items:center;gap:6px;margin-left:auto}
#sr{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:3px 8px;border-radius:3px;width:85px;outline:none}
#sr:focus{border-color:var(--accent)}#sr::placeholder{color:#333}
#vc{font-size:10px;color:#555;white-space:nowrap}#vc b{color:var(--accent);font-weight:normal}
#gps-btn{background:transparent;border:1px solid #252535;color:#555;font-size:15px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:3px;transition:all .2s;flex-shrink:0}
#gps-btn.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px rgba(0,255,204,.3)}
/* MAP */
#map{flex:1;background:#050510}
/* FOOTER */
#ft{background:var(--panel);border-top:1px solid var(--border);padding:5px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;font-size:11px;color:#555;flex-wrap:wrap}
#ft b{color:var(--accent);font-weight:normal}
.fb{background:transparent;border:1px solid #252535;color:#555;font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 7px;cursor:pointer;border-radius:2px;transition:all .2s}
.fb:hover,.fb:active{border-color:var(--accent);color:var(--accent)}
#gps-info{margin-left:auto;color:#333;font-size:10px;white-space:nowrap}
/* ALERTE PROXIMITE */
#alert{position:fixed;top:0;left:0;right:0;z-index:9998;background:linear-gradient(135deg,#060e06,#0a1a0a);border-bottom:2px solid var(--ok);padding:10px 14px;display:none;flex-direction:column;gap:5px;animation:slideDown .3s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
#alert-title{font-family:'Orbitron',monospace;font-size:12px;color:var(--ok);display:flex;align-items:center;gap:6px}
.blink{animation:blink 0.7s infinite}
#alert-body{font-size:11px;color:#aaa;display:flex;align-items:center;justify-content:space-between;gap:8px}
#alert-close{background:transparent;border:1px solid #1a3a1a;color:#555;font-size:10px;padding:2px 8px;cursor:pointer;border-radius:2px;font-family:'Share Tech Mono',monospace;flex-shrink:0}
#alert-close:hover{border-color:var(--ok);color:var(--ok)}
/* LEAFLET */
.leaflet-container{background:#080810!important}
.leaflet-tile{filter:grayscale(100%) brightness(.35) sepia(.4) hue-rotate(200deg)}
.leaflet-popup-content-wrapper{background:var(--panel);border:1px solid #252535;border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,.9)}
.leaflet-popup-tip{background:var(--panel)}
.leaflet-popup-close-button{color:#444!important}
.leaflet-popup-content{color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;margin:10px 14px;min-width:158px}
.pi{font-family:'Orbitron',monospace;font-weight:900;font-size:14px;color:var(--accent);margin-bottom:4px}
.ps{padding:2px 7px;border-radius:2px;font-size:10px;display:inline-block}
.ps.OK{background:rgba(0,255,136,.1);color:var(--ok);border:1px solid var(--ok)}
.ps.damaged{background:rgba(255,170,0,.1);color:var(--damaged);border:1px solid var(--damaged)}
.ps.destroyed{background:rgba(255,51,85,.1);color:var(--destroyed);border:1px solid var(--destroyed)}
.ps.hidden{background:rgba(136,136,255,.1);color:var(--hidden);border:1px solid var(--hidden)}
.ph{color:#666;font-size:10px;margin-top:5px;font-style:italic;line-height:1.4}
.pa{margin-top:8px;display:flex;gap:5px}
.pb{flex:1;background:transparent;border:1px solid #252535;color:#666;font-family:'Share Tech Mono',monospace;font-size:10px;padding:4px;cursor:pointer;border-radius:2px;text-align:center;text-decoration:none;display:block;transition:all .15s}
.pb:hover,.pb:active{border-color:var(--accent);color:var(--accent)}
.pf{border-color:var(--ok)!important;color:var(--ok)!important}
.pf.fl{background:rgba(0,255,136,.1)!important}
.my-dot{width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid rgba(255,255,255,.9);box-shadow:0 0 0 4px rgba(0,255,204,.25),0 0 12px rgba(0,255,204,.4)}
</style>
