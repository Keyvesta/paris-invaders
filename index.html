<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>🕹️ Paris Invaders</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--panel:#0f0f1a;--border:#1a1a2e;--ok:#00ff88;--damaged:#ffaa00;--destroyed:#ff3355;--hidden:#8888ff;--text:#c8c8e8;--accent:#00ffcc}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* SPLASH */
#splash{position:fixed;inset:0;background:#050508;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s;overflow:hidden}
#splash-canvas{position:absolute;inset:0;width:100%;height:100%}
#splash-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:18px}
#splash-invader{animation:invaderFloat 2.2s ease-in-out infinite,invaderAppear .7s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes invaderAppear{from{opacity:0;transform:scale(0) translateY(-30px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes invaderFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-10px) rotate(1deg)}}
#splash-laser{width:3px;height:0;background:linear-gradient(180deg,#ff3355 0%,rgba(255,51,85,0) 100%);margin:-6px auto 0;border-radius:2px;animation:laserShoot 2.2s ease-in-out infinite .1s}
@keyframes laserShoot{0%,35%{height:0;opacity:0}48%{height:50px;opacity:1}62%{height:0;opacity:0}100%{height:0;opacity:0}}
#splash-titlegroup{display:flex;flex-direction:column;align-items:center;gap:6px}
#splash-title{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(22px,6vw,36px);color:var(--accent);letter-spacing:5px;animation:titleGlow 2s ease-in-out infinite}
#splash-title s{color:#ff3355;text-decoration:none}
@keyframes titleGlow{0%,100%{text-shadow:0 0 20px rgba(0,255,204,.4),0 0 60px rgba(0,255,204,.1)}50%{text-shadow:0 0 30px rgba(0,255,204,.9),0 0 80px rgba(0,255,204,.3)}}
#splash-sub{font-size:11px;color:#2a2a4a;letter-spacing:4px}
#splash-bar-bg{width:min(260px,65vw);height:1px;background:#0f0f1f;overflow:hidden}
#splash-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--ok),var(--accent));transition:width .4s ease;box-shadow:0 0 8px var(--accent)}
#splash-msg{font-size:10px;color:#333;letter-spacing:3px;margin-top:4px}
#splash-msg::after{content:'_';animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse{0%,100%{text-shadow:0 0 20px rgba(0,255,204,.4)}50%{text-shadow:0 0 50px rgba(0,255,204,.9)}}
/* HEADER */
#hd{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;z-index:1000;flex-shrink:0}
#tt{font-family:'Orbitron',monospace;font-weight:900;font-size:14px;color:var(--accent);letter-spacing:2px;white-space:nowrap}
#tt s{color:#ff3355;text-decoration:none}
#st{display:flex;gap:4px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:4px;font-size:15px;padding:5px 9px;border-radius:3px;border:1px solid;cursor:pointer;transition:all .2s;user-select:none;white-space:nowrap}
.stat.off{opacity:.2}
.ok{color:var(--ok);border-color:var(--ok)}.ok.on{background:rgba(0,255,136,.1)}
.dm{color:var(--damaged);border-color:var(--damaged)}.dm.on{background:rgba(255,170,0,.1)}
.ds{color:var(--destroyed);border-color:var(--destroyed)}.ds.on{background:rgba(255,51,85,.1)}
.hd{color:var(--hidden);border-color:var(--hidden)}.hd.on{background:rgba(136,136,255,.1)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ok .dot{background:var(--ok)}.dm .dot{background:var(--damaged)}.ds .dot{background:var(--destroyed)}.hd .dot{background:var(--hidden)}
#rg{display:flex;align-items:center;gap:5px;margin-left:auto}
#sr{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;padding:5px 8px;border-radius:3px;width:90px;outline:none}
#sr:focus{border-color:var(--accent)}#sr::placeholder{color:#333}
#vc{font-size:14px;color:#555;white-space:nowrap}#vc b{color:var(--accent);font-weight:normal}
.hbtn{background:transparent;border:1px solid #252535;color:#555;font-size:17px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:3px;transition:all .2s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.hbtn.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px rgba(0,255,204,.3)}
/* MAP */
#map{flex:1;background:#050510;position:relative}
/* FOOTER */
#ft{background:var(--panel);border-top:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;font-size:15px;color:#555;flex-wrap:wrap}
#ft b{color:var(--accent);font-weight:normal}
.fb{background:transparent;border:1px solid #252535;color:#555;font-family:'Share Tech Mono',monospace;font-size:15px;padding:6px 11px;cursor:pointer;border-radius:2px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.fb:hover,.fb:active{border-color:var(--accent);color:var(--accent)}
#gps-info{margin-left:auto;color:#333;font-size:12px;white-space:nowrap}
/* ALERTE PROXIMITE */
#alert{position:fixed;top:0;left:0;right:0;z-index:9998;background:linear-gradient(135deg,#060e06,#0a1a0a);border-bottom:2px solid var(--ok);padding:12px 14px;display:none;align-items:center;gap:8px;animation:slideDown .3s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
#alert-title{font-family:'Orbitron',monospace;font-size:13px;color:var(--ok);display:flex;align-items:center;gap:5px;white-space:nowrap}
.blink{animation:blink 0.7s infinite}
#alert-info{font-size:13px;color:#aaa;flex:1}
#alert-nav{background:transparent;border:1px solid var(--ok);color:var(--ok);font-family:'Share Tech Mono',monospace;font-size:12px;padding:5px 10px;cursor:pointer;border-radius:2px;white-space:nowrap}
#alert-close{background:transparent;border:1px solid #1a3a1a;color:#555;font-size:12px;padding:5px 9px;cursor:pointer;border-radius:2px;font-family:'Share Tech Mono',monospace;white-space:nowrap}
/* PANEL RADAR */
#radar{position:fixed;bottom:48px;left:0;right:0;z-index:9000;background:var(--panel);border-top:1px solid var(--border);padding:8px 10px;display:none;flex-direction:column;gap:6px;max-height:55vh;overflow:hidden}
#radar-hd{display:flex;align-items:center;gap:8px}
#radar-title{font-family:'Orbitron',monospace;font-size:13px;color:var(--accent)}
#radar-radius{display:flex;align-items:center;gap:6px;margin-left:auto;font-size:12px;color:#555}
#radius-val{color:var(--accent)}
#radar-list{overflow-y:auto;display:flex;flex-direction:column;gap:4px;max-height:calc(55vh - 40px)}
.radar-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border:1px solid #1a1a2e;border-radius:3px;cursor:pointer;transition:all .15s}
.radar-item:hover,.radar-item:active{border-color:var(--accent)}
.radar-item.fl{opacity:.4}
.ri-id{font-family:'Orbitron',monospace;font-size:13px;color:var(--accent);width:76px;flex-shrink:0}
.ri-dist{font-size:13px;color:#777;width:46px;flex-shrink:0}
.ri-status{font-size:11px;padding:2px 6px;border-radius:2px;flex-shrink:0}
.ri-hint{font-size:11px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-nav{background:transparent;border:1px solid #252535;color:#555;font-size:14px;padding:3px 8px;cursor:pointer;border-radius:2px;flex-shrink:0;font-family:'Share Tech Mono',monospace}
.ri-nav:hover{border-color:var(--accent);color:var(--accent)}
/* PANEL STATS */
#stats-panel{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9990;background:var(--bg);overflow-y:auto;display:none;flex-direction:column}
#stats-hd{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:1}
#stats-title{font-family:'Orbitron',monospace;font-size:16px;color:var(--accent)}
#stats-close{margin-left:auto;background:transparent;border:1px solid #252535;color:#555;font-size:15px;padding:6px 14px;cursor:pointer;border-radius:3px;font-family:'Share Tech Mono',monospace}
#stats-close:hover{border-color:var(--accent);color:var(--accent)}
#stats-body{padding:14px}
.stats-global{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.sg-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:14px;text-align:center}
.sg-val{font-family:'Orbitron',monospace;font-size:28px;color:var(--accent);font-weight:900}
.sg-lbl{font-size:14px;color:#555;letter-spacing:1px;margin-top:4px}
.sg-bar{height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.sg-bar-fill{height:100%;background:linear-gradient(90deg,var(--ok),var(--accent));transition:width .5s ease}
#arr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.arr-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:12px;cursor:pointer;transition:all .2s}
.arr-card:hover{border-color:var(--accent)}
.arr-num{font-family:'Orbitron',monospace;font-size:16px;color:var(--accent);margin-bottom:5px}
.arr-prog{font-size:15px;color:#777;margin-bottom:6px}
.arr-bar{height:3px;background:var(--border);border-radius:1px;overflow:hidden}
.arr-bar-fill{height:100%;background:linear-gradient(90deg,var(--ok),var(--accent));transition:width .5s ease}
.arr-counts{display:flex;gap:6px;margin-top:6px;font-size:14px}
/* PANEL ITINERAIRE */
#rando-panel{position:fixed;bottom:48px;right:8px;z-index:9001;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:10px;display:none;width:240px;max-height:60vh;overflow-y:auto}
#rando-title{font-family:'Orbitron',monospace;font-size:13px;color:var(--accent);margin-bottom:8px}
#rando-config{display:flex;flex-direction:column;gap:8px;font-size:13px;color:#777}
#rando-config label{display:flex;align-items:center;justify-content:space-between;gap:8px}
#rando-config input[type=range]{flex:1;accent-color:var(--accent)}
#rando-config span{color:var(--accent);width:35px;text-align:right}
#rando-start{width:100%;margin-top:8px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:13px;padding:8px;cursor:pointer;border-radius:3px;transition:all .2s}
#rando-start:hover{background:rgba(0,255,204,.1)}
#rando-route{margin-top:8px;display:none}
.rando-stop{font-size:12px;color:#aaa;padding:5px 0;border-bottom:1px solid #1a1a2e;display:flex;align-items:center;gap:6px}
.rando-stop-num{color:var(--accent);font-family:'Orbitron',monospace;font-size:11px;width:18px;flex-shrink:0}
.rando-stop-id{color:var(--accent);width:66px;flex-shrink:0;font-family:'Orbitron',monospace;font-size:11px}
.rando-stop-d{color:#555;width:35px;flex-shrink:0}
.rando-stop-nav{background:transparent;border:1px solid #252535;color:#555;font-size:13px;padding:3px 6px;cursor:pointer;border-radius:2px;font-family:'Share Tech Mono',monospace;margin-left:auto}
.rando-stop-nav:hover{border-color:var(--accent);color:var(--accent)}
/* SLIDER RAYON */
input[type=range]{-webkit-appearance:none;appearance:none;height:2px;background:var(--border);border-radius:1px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer}
/* LEAFLET */
.leaflet-container{background:#080810!important}
.leaflet-tile{filter:grayscale(100%) brightness(.35) sepia(.4) hue-rotate(200deg)}
.leaflet-popup-content-wrapper{background:var(--panel);border:1px solid #252535;border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,.9)}
.leaflet-popup-tip{background:var(--panel)}
.leaflet-popup-close-button{color:#444!important}
.leaflet-popup-content{color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;margin:10px 14px;min-width:170px}
.pi{font-family:'Orbitron',monospace;font-weight:900;font-size:16px;color:var(--accent);margin-bottom:4px}
.ps{padding:3px 8px;border-radius:2px;font-size:12px;display:inline-block}
.ps.OK{background:rgba(0,255,136,.1);color:var(--ok);border:1px solid var(--ok)}
.ps.damaged{background:rgba(255,170,0,.1);color:var(--damaged);border:1px solid var(--damaged)}
.ps.destroyed{background:rgba(255,51,85,.1);color:var(--destroyed);border:1px solid var(--destroyed)}
.ps.hidden{background:rgba(136,136,255,.1);color:var(--hidden);border:1px solid var(--hidden)}
.ph{color:#666;font-size:11px;margin-top:5px;font-style:italic;line-height:1.4}
.pa{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap}
.pb{flex:1;background:transparent;border:1px solid #252535;color:#666;font-family:'Share Tech Mono',monospace;font-size:12px;padding:7px;cursor:pointer;border-radius:2px;text-align:center;text-decoration:none;display:block;transition:all .15s;white-space:nowrap}
.pb:hover,.pb:active{border-color:var(--accent);color:var(--accent)}
.pf{border-color:var(--ok)!important;color:var(--ok)!important}
.pf.fl{background:rgba(0,255,136,.1)!important}
.pnav{border-color:var(--accent)!important;color:var(--accent)!important}
.my-dot{width:18px;height:18px;border-radius:50%;background:var(--accent);border:2px solid rgba(255,255,255,.9);box-shadow:0 0 0 4px rgba(0,255,204,.25),0 0 12px rgba(0,255,204,.4)}
.route-line{stroke:rgba(0,255,204,.5);stroke-width:2;stroke-dasharray:6,4;fill:none}
/* LISTE PANEL */
#list-panel{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9990;background:var(--bg);display:none;flex-direction:column}
#list-hd{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:1;flex-shrink:0}
#list-title{font-family:'Orbitron',monospace;font-size:15px;color:var(--accent)}
#list-count{font-size:12px;color:#555;margin-right:auto}
#list-close{background:transparent;border:1px solid #252535;color:#555;font-size:14px;padding:6px 14px;cursor:pointer;border-radius:3px;font-family:'Share Tech Mono',monospace}
#list-close:hover{border-color:var(--accent);color:var(--accent)}
#list-filters{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.lf-btn{background:transparent;border:1px solid #1a1a2e;color:#444;font-family:'Share Tech Mono',monospace;font-size:12px;padding:5px 10px;cursor:pointer;border-radius:3px;transition:all .15s;white-space:nowrap}
.lf-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,204,.07)}
.lf-btn.f-ok.active{border-color:var(--ok);color:var(--ok);background:rgba(0,255,136,.07)}
.lf-btn.f-dm.active{border-color:var(--damaged);color:var(--damaged);background:rgba(255,170,0,.07)}
.lf-btn.f-ds.active{border-color:var(--destroyed);color:var(--destroyed);background:rgba(255,51,85,.07)}
.lf-btn.f-hd.active{border-color:var(--hidden);color:var(--hidden);background:rgba(136,136,255,.07)}
#list-search-row{display:flex;gap:8px;padding:8px 16px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;align-items:center}
#list-search{flex:1;background:var(--panel);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;padding:7px 10px;border-radius:3px;outline:none}
#list-search:focus{border-color:var(--accent)}
#list-sort{background:var(--panel);border:1px solid var(--border);color:#777;font-family:'Share Tech Mono',monospace;font-size:12px;padding:7px 8px;border-radius:3px;cursor:pointer;outline:none}
#list-body{flex:1;overflow-y:auto;padding:8px}
.li-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #0f0f1a;border-radius:4px;margin-bottom:5px;cursor:pointer;transition:all .15s;background:var(--panel)}
.li-row:hover,.li-row:active{border-color:var(--accent)}
.li-row.li-flashed{opacity:.45}
.li-id{font-family:'Orbitron',monospace;font-size:13px;color:var(--accent);width:90px;flex-shrink:0}
.li-status{font-size:11px;padding:2px 7px;border-radius:2px;flex-shrink:0;width:70px;text-align:center}
.li-arr{font-size:12px;color:#555;width:52px;flex-shrink:0}
.li-hint{font-size:12px;color:#444;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-dist{font-size:12px;color:#666;width:52px;text-align:right;flex-shrink:0}
.li-flash{background:transparent;border:1px solid #1a1a2e;color:#555;font-size:11px;padding:4px 8px;cursor:pointer;border-radius:2px;font-family:'Share Tech Mono',monospace;flex-shrink:0;transition:all .15s}
.li-flash:hover{border-color:var(--ok);color:var(--ok)}
.li-flash.fl{border-color:var(--ok);color:var(--ok);background:rgba(0,255,136,.1)}
/* CHOROPLETH */
#choro-layer{position:absolute;inset:0;pointer-events:none;z-index:400;display:none}
#choro-legend{position:fixed;bottom:60px;left:10px;z-index:9002;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:10px 12px;display:none;font-size:11px;color:#555}
#choro-legend-title{font-family:'Orbitron',monospace;font-size:11px;color:var(--accent);margin-bottom:8px}
.choro-leg-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.choro-leg-swatch{width:24px;height:12px;border-radius:2px;flex-shrink:0}
/* arr filter chips dans liste */
#list-arr-row{display:flex;gap:5px;padding:6px 16px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.la-chip{background:transparent;border:1px solid #1a1a2e;color:#333;font-family:'Share Tech Mono',monospace;font-size:11px;padding:3px 8px;cursor:pointer;border-radius:12px;white-space:nowrap;transition:all .15s;flex-shrink:0}
.la-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,204,.07)}
</style>
</head>
<body>

<div id="splash">
  <canvas id="splash-canvas"></canvas>
  <div id="splash-content">
    <div id="splash-invader">
      <svg width="96" height="80" viewBox="0 0 12 10" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
        <defs><filter id="iglow"><feGaussianBlur stdDeviation="0.6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
        <g filter="url(#iglow)">
        <rect x="1" y="0" width="1" height="1" fill="#00ffcc"/>
        <rect x="10" y="0" width="1" height="1" fill="#00ffcc"/>
        <rect x="2" y="1" width="1" height="1" fill="#00ffcc"/>
        <rect x="9" y="1" width="1" height="1" fill="#00ffcc"/>
        <rect x="1" y="2" width="10" height="1" fill="#00ffcc"/>
        <rect x="0" y="3" width="2" height="1" fill="#00ffcc"/>
        <rect x="3" y="3" width="6" height="1" fill="#00ffcc"/>
        <rect x="10" y="3" width="2" height="1" fill="#00ffcc"/>
        <rect x="0" y="4" width="12" height="1" fill="#00ffcc"/>
        <rect x="0" y="5" width="1" height="1" fill="#00ffcc"/>
        <rect x="2" y="5" width="3" height="1" fill="#00ffcc"/>
        <rect x="7" y="5" width="3" height="1" fill="#00ffcc"/>
        <rect x="11" y="5" width="1" height="1" fill="#00ffcc"/>
        <rect x="0" y="6" width="1" height="1" fill="#00ffcc"/>
        <rect x="3" y="6" width="1" height="1" fill="#00ffcc"/>
        <rect x="8" y="6" width="1" height="1" fill="#00ffcc"/>
        <rect x="11" y="6" width="1" height="1" fill="#00ffcc"/>
        <rect x="0" y="8" width="2" height="1" fill="#00ffcc"/>
        <rect x="10" y="8" width="2" height="1" fill="#00ffcc"/>
        <rect x="3" y="3" width="2" height="1" fill="#ff3355"/>
        <rect x="7" y="3" width="2" height="1" fill="#ff3355"/>
        </g>
      </svg>

<script>
const C={OK:'#00ff88',damaged:'#ffaa00',destroyed:'#ff3355',hidden:'#8888ff'};
let PROX=150;
let D=[],af=new Set(['OK','damaged','destroyed','hidden']),fl=new Set(JSON.parse(localStorage.getItem('piv')||'[]')),mk={};
let gpsOn=false,gpsWatch=null,posMk=null,proxCircle=null,myLat=null,myLng=null,lastAlerted=new Set();

// ── SPLASH + LOAD DATA ─────────────────────────────────────────────────
// ── SPLASH CANVAS PARTICLE SYSTEM ──────────────────────────────────────
(function initSplashCanvas(){
  const canvas = document.getElementById('splash-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], parisPath2D;
  
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildParis();
  }
  
  // Paris outline as canvas path (normalized to screen center)
  function buildParis(){
    const cx = W/2, cy = H/2;
    const sc = Math.min(W,H) * 0.0013;
    parisPath2D = new Path2D();
    // Périphérique outer
    const pts = [
      [0,182],[18,180],[38,178],[56,182],[74,186],[90,194],[104,206],
      [116,216],[126,228],[134,242],[138,256],[140,272],[138,288],
      [132,302],[122,314],[108,322],[92,328],[74,330],[56,330],[38,328],
      [20,322],[4,312],[-12,298],[-24,282],[-30,266],[-32,250],[-32,234],
      [-28,218],[-20,204],[-10,192],[0,182]
    ].map(([x,y]) => [cx + (x-38)*sc*2.2, cy + (y-256)*sc*2.2]);
    parisPath2D.moveTo(pts[0][0], pts[0][1]);
    pts.slice(1).forEach(([x,y]) => parisPath2D.lineTo(x,y));
    parisPath2D.closePath();
  }
  
  // Particles: stars + floating invader debris pixels
  function spawnParticles(){
    particles = [];
    // Stars
    for(let i=0;i<120;i++){
      particles.push({
        type:'star', x:Math.random()*W, y:Math.random()*H,
        r:Math.random()*1.5+0.3, a:Math.random(), da:(Math.random()-.5)*.015,
        color:`rgba(${180+Math.random()*75},${180+Math.random()*75},255,`
      });
    }
    // Floating pixel debris
    for(let i=0;i<30;i++){
      particles.push({
        type:'pixel', x:Math.random()*W, y:Math.random()*H,
        vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4,
        sz:Math.random()*3+1, a:Math.random()*.6,
        color:Math.random()>.5?'#00ffcc':'#ff3355'
      });
    }
  }
  
  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    t+=.008;
    
    // Deep space background gradient
    const grad = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
    grad.addColorStop(0,'#0a0820');
    grad.addColorStop(1,'#050508');
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,W,H);
    
    // Paris outline glow
    const pulseA = 0.12 + Math.sin(t*1.2)*.06;
    ctx.save();
    ctx.strokeStyle=`rgba(0,255,204,${pulseA+.1})`;
    ctx.lineWidth=1.2;
    ctx.setLineDash([5,4]);
    ctx.shadowColor='#00ffcc';
    ctx.shadowBlur=8;
    ctx.stroke(parisPath2D);
    ctx.fillStyle=`rgba(0,255,204,${pulseA*.2})`;
    ctx.fill(parisPath2D);
    ctx.restore();
    
    // Scan line across paris
    const scanY = H/2 - 120 + ((t*30)%240);
    const scanGrad = ctx.createLinearGradient(W/2-200,0,W/2+200,0);
    scanGrad.addColorStop(0,'transparent');
    scanGrad.addColorStop(.5,`rgba(0,255,204,${0.3+Math.sin(t*3)*.1})`);
    scanGrad.addColorStop(1,'transparent');
    ctx.fillStyle=scanGrad;
    ctx.fillRect(W/2-220,scanY,440,1.5);
    
    // Particles
    particles.forEach(p=>{
      if(p.type==='star'){
        p.a+=p.da;
        if(p.a<0||p.a>1) p.da*=-1;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=p.color+Math.max(0.05,p.a)+')';
        ctx.fill();
      } else {
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0;
        if(p.y<0)p.y=H; if(p.y>H)p.y=0;
        ctx.fillStyle=p.color;
        ctx.globalAlpha=p.a*(0.5+Math.sin(t*2+p.x)*.3);
        ctx.fillRect(p.x,p.y,p.sz,p.sz);
        ctx.globalAlpha=1;
      }
    });
    
    requestAnimationFrame(draw);
  }
  
  resize();
  spawnParticles();
  draw();
  window.addEventListener('resize', ()=>{resize(); spawnParticles();});
})();

function prog(p,msg){

}

// ── MARKERS ─────────────────────────────────────────────────────────────
function mi(st,f){
  const c=C[st]||'#00ffcc',o=f?0.15:1;
  return L.divIcon({
    html:`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 16 16" opacity="${o}"><rect x="1.5" y="1.5" width="13" height="13" fill="${c}18" stroke="${c}" stroke-width="1.5"/><rect x="4" y="4" width="3" height="3" fill="${c}"/><rect x="9" y="4" width="3" height="3" fill="${c}"/><rect x="5" y="9" width="6" height="2" fill="${c}"/><rect x="3" y="7" width="1.5" height="2" fill="${c}66"/><rect x="11.5" y="7" width="1.5" height="2" fill="${c}66"/></svg>`,
    className:'',iconSize:[22,22],iconAnchor:[11,11],popupAnchor:[0,-13]
  });
}

function initMarkers(){
  const s=D.reduce((a,i)=>{a[i.status]=(a[i.status]||0)+1;return a},{});
  document.getElementById('co').textContent=s.OK||0;
  document.getElementById('cd').textContent=s.damaged||0;
  document.getElementById('cx').textContent=s.destroyed||0;
  document.getElementById('ch').textContent=s.hidden||0;
  D.forEach(inv=>{
    if(!inv.obf_lat||!inv.obf_lng)return;
    const m=L.marker([inv.obf_lat,inv.obf_lng],{icon:mi(inv.status,fl.has(inv.id)),invStatus:inv.status,invId:inv.id});
    m.bindPopup(()=>pop(inv),{minWidth:170});
    mk[inv.id]=m;
  });
  rn();
  document.getElementById('fn').textContent=fl.size;
}

function pop(inv){
  const f=fl.has(inv.id);
  const arr=getArr(inv.id);
  const navUrl=`https://maps.apple.com/?daddr=${inv.obf_lat},${inv.obf_lng}&dirflg=w`;
  const gmUrl=`https://www.google.com/maps/dir/?api=1&destination=${inv.obf_lat},${inv.obf_lng}&travelmode=walking`;
  return `<div>
    <div class="pi">${inv.id}</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
      <div class="ps ${inv.status}">${inv.status.toUpperCase()}</div>
      ${arr?`<div style="font-size:9px;color:#555">${arr}e arr.</div>`:''}
    </div>
    ${inv.hint?`<div class="ph">💡 ${inv.hint}</div>`:''}
    <div class="pa">
      <button class="pb pf ${f?'fl':''}" onclick="tfl('${inv.id}',this)">${f?'✓ FLASHÉ':'⚡ FLASH'}</button>
      <a href="${inv.instagramUrl}" target="_blank" class="pb">📸 INSTA</a>
    </div>
    <div class="pa">
      <a href="${navUrl}" target="_blank" class="pb pnav">🗺 APPLE</a>
      <a href="${gmUrl}" target="_blank" class="pb pnav">📍 GMAPS</a>
    </div>
  </div>`;
}

function getArr(id){
  // PA_XXX → arrondissement par numéro
  // Estimation par coordonnées selon les ranges de numéros PA_
  const inv=D.find(i=>i.id===id);
  if(!inv||!inv.obf_lat)return null;
  // Mapping lat/lng vers arrondissement Paris
  return geoArr(inv.obf_lat,inv.obf_lng);
}

function geoArr(lat,lng){
  // Approximation grossière des arrondissements de Paris par bounding boxes
  if(lat>48.875&&lng<2.35)return 18;
  if(lat>48.875&&lng>=2.35&&lng<2.37)return 19;
  if(lat>48.875&&lng>=2.37)return 20;
  if(lat>48.865&&lat<=48.875&&lng<2.34)return 17;
  if(lat>48.865&&lat<=48.875&&lng>=2.34&&lng<2.36)return 9;
  if(lat>48.865&&lat<=48.875&&lng>=2.36&&lng<2.375)return 10;
  if(lat>48.865&&lat<=48.875&&lng>=2.375)return 11;
  if(lat>48.855&&lat<=48.865&&lng<2.325)return 8;
  if(lat>48.855&&lat<=48.865&&lng>=2.325&&lng<2.345)return 2;
  if(lat>48.855&&lat<=48.865&&lng>=2.345&&lng<2.36)return 3;
  if(lat>48.855&&lat<=48.865&&lng>=2.36&&lng<2.375)return 11;
  if(lat>48.855&&lat<=48.865&&lng>=2.375)return 20;
  if(lat>48.845&&lat<=48.855&&lng<2.32)return 7;
  if(lat>48.845&&lat<=48.855&&lng>=2.32&&lng<2.335)return 1;
  if(lat>48.845&&lat<=48.855&&lng>=2.335&&lng<2.355)return 4;
  if(lat>48.845&&lat<=48.855&&lng>=2.355&&lng<2.375)return 12;
  if(lat>48.845&&lat<=48.855&&lng>=2.375)return 12;
  if(lat>48.835&&lat<=48.845&&lng<2.33)return 15;
  if(lat>48.835&&lat<=48.845&&lng>=2.33&&lng<2.35)return 6;
  if(lat>48.835&&lat<=48.845&&lng>=2.35&&lng<2.365)return 5;
  if(lat>48.835&&lat<=48.845&&lng>=2.365)return 13;
  if(lat<=48.835&&lng<2.31)return 15;
  if(lat<=48.835&&lng>=2.31&&lng<2.35)return 14;
  if(lat<=48.835&&lng>=2.35)return 13;
  return null;
}

function rn(){
  cg.clearLayers();let n=0;
  Object.values(mk).forEach(m=>{if(af.has(m.options.invStatus)){cg.addLayer(m);n++;}});
  document.getElementById('vn').textContent=n;
}

function tf(s){
  af.has(s)?af.delete(s):af.add(s);
  document.querySelectorAll('.stat').forEach(el=>{
    const st=el.getAttribute('onclick').match(/'([^']+)'/)[1];
    el.classList.toggle('on',af.has(st));el.classList.toggle('off',!af.has(st));
  });
  rn();
}

function si(v){
  v=v.toUpperCase().trim();if(!v){rn();return;}
  cg.clearLayers();let n=0;
  Object.entries(mk).forEach(([id,m])=>{
    if(id.includes(v)&&af.has(m.options.invStatus)){
      cg.addLayer(m);n++;
      if(n===1){const inv=D.find(i=>i.id===id);if(inv)map.setView([inv.obf_lat,inv.obf_lng],18);m.openPopup();}
    }
  });
  document.getElementById('vn').textContent=n;
}

function tfl(id,btn){
  if(fl.has(id)){fl.delete(id);btn.textContent='⚡ FLASH';btn.classList.remove('fl');}
  else{fl.add(id);btn.textContent='✓ FLASHÉ';btn.classList.add('fl');}
  const inv=D.find(i=>i.id===id);
  if(inv&&mk[id])mk[id].setIcon(mi(inv.status,fl.has(id)));
  localStorage.setItem('piv',JSON.stringify([...fl]));
  document.getElementById('fn').textContent=fl.size;
  if(radarOpen)updateRadarList();
  if(document.getElementById('list-panel').style.display==='flex')renderList();
  if(choroOn)drawChoro();
}

// ── GPS ──────────────────────────────────────────────────────────────────
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function toggleGps(){gpsOn?stopGps():startGps();}

function startGps(){
  if(!navigator.geolocation){alert('Géolocalisation non supportée');return;}
  const btn=document.getElementById('gps-btn');
  btn.classList.add('active');
  document.getElementById('gps-info').style.color='var(--accent)';
  document.getElementById('gps-info').textContent='GPS…';
  navigator.geolocation.getCurrentPosition(pos=>{
    onPos(pos);
    gpsWatch=navigator.geolocation.watchPosition(onPos,onGpsErr,{enableHighAccuracy:true,timeout:30000,maximumAge:10000});
    gpsOn=true;
  },onGpsErr,{enableHighAccuracy:true,timeout:20000,maximumAge:0});
}

function stopGps(){
  if(gpsWatch)navigator.geolocation.clearWatch(gpsWatch);
  gpsOn=false;gpsWatch=null;myLat=null;myLng=null;
  if(posMk){map.removeLayer(posMk);posMk=null;}
  if(proxCircle){map.removeLayer(proxCircle);proxCircle=null;}
  document.getElementById('gps-btn').classList.remove('active');
  document.getElementById('gps-info').textContent='GPS OFF';
  document.getElementById('gps-info').style.color='#333';
  lastAlerted.clear();closeAlert();
}

function onPos(pos){
  myLat=pos.coords.latitude;myLng=pos.coords.longitude;
  const acc=Math.round(pos.coords.accuracy);
  document.getElementById('gps-info').textContent=`±${acc}m`;
  document.getElementById('gps-info').style.color=acc<30?'var(--ok)':acc<80?'var(--damaged)':'var(--destroyed)';
  if(!posMk){
    posMk=L.marker([myLat,myLng],{
      icon:L.divIcon({html:'<div class="my-dot"></div>',className:'',iconSize:[18,18],iconAnchor:[9,9]}),
      zIndexOffset:1000
    }).addTo(map);
    map.setView([myLat,myLng],17);
  }else{posMk.setLatLng([myLat,myLng]);}
  if(!proxCircle){
    proxCircle=L.circle([myLat,myLng],{radius:PROX,color:'rgba(0,255,204,.4)',weight:1,fillOpacity:.04,dashArray:'5,8'}).addTo(map);
  }else{
    proxCircle.setLatLng([myLat,myLng]);
    proxCircle.setRadius(PROX);
  }
  checkProximity();
  if(radarOpen)updateRadarList();
}

function onGpsErr(e){
  const msg={1:'REFUSÉ',2:'INDISPO',3:'TIMEOUT'};
  document.getElementById('gps-info').textContent='GPS '+( msg[e.code]||'ERR');
  document.getElementById('gps-info').style.color='var(--destroyed)';
}

function checkProximity(){
  if(myLat===null)return;
  const nearby=getNearby(PROX);
  const newOnes=nearby.filter(i=>!lastAlerted.has(i.id));
  if(newOnes.length>0){
    newOnes.forEach(i=>lastAlerted.add(i.id));
    alertInv=nearby[0];
    showAlert(nearby);
    if(navigator.vibrate)navigator.vibrate([200,80,200,80,400]);
  }
  lastAlerted.forEach(id=>{if(!nearby.find(i=>i.id===id))lastAlerted.delete(id);});
  if(nearby.length===0)closeAlert();
}

function getNearby(radius){
  if(myLat===null)return[];
  const nearby=[];
  D.forEach(inv=>{
    if(!inv.obf_lat||!inv.obf_lng||fl.has(inv.id)||!af.has(inv.status))return;
    const dist=haversine(myLat,myLng,inv.obf_lat,inv.obf_lng);
    if(dist<=radius)nearby.push({...inv,dist:Math.round(dist)});
  });
  return nearby.sort((a,b)=>a.dist-b.dist);
}

function showAlert(nearby){
  const c=nearby[0];
  const more=nearby.length>1?` +${nearby.length-1}`:''
  document.getElementById('alert-info').innerHTML=
    `<b style="color:var(--ok);font-family:Orbitron,monospace">${c.id}</b> · <b>${c.dist}m</b>${more}`;
  document.getElementById('alert').style.display='flex';
}

function closeAlert(){document.getElementById('alert').style.display='none';}

function navClosest(){
  if(!alertInv)return;
  const url=`https://maps.apple.com/?daddr=${alertInv.obf_lat},${alertInv.obf_lng}&dirflg=w`;
  window.open(url,'_blank');
}

  document.getElementById('radar-btn').classList.toggle('active',radarOpen);

}

function updateRadius(v){
  PROX=parseInt(v);
  document.getElementById('radius-val').textContent=v;
  if(proxCircle)proxCircle.setRadius(PROX);
  if(radarOpen)updateRadarList();

}

function updateRadarList(){
  const list=document.getElementById('radar-list');
  if(myLat===null){
    list.innerHTML='<div style="font-size:10px;color:#555;padding:8px">Active le GPS pour voir les invaders proches</div>';
    return;
  }
  // Top 10 nearest (non flashés dans le rayon, ou tous les non-flashés si GPS actif)
  const all=D.filter(inv=>inv.obf_lat&&inv.obf_lng&&!fl.has(inv.id)&&af.has(inv.status))
    .map(inv=>({...inv,dist:Math.round(haversine(myLat,myLng,inv.obf_lat,inv.obf_lng))}))
    .sort((a,b)=>a.dist-b.dist)
    .slice(0,10);
  
  if(all.length===0){list.innerHTML='<div style="font-size:10px;color:#555;padding:8px">Aucun invader à flasher</div>';return;}
  
  list.innerHTML=all.map(inv=>{
    const c=C[inv.status]||'#00ffcc';
    const inR=inv.dist<=PROX;
    return `<div class="radar-item${fl.has(inv.id)?' fl':''}" onclick="focusInv('${inv.id}')">
      <div class="ri-id">${inv.id}</div>
      <div class="ri-dist" style="color:${inR?'var(--ok)':'#777'}">${inv.dist}m</div>
      <div class="ri-status" style="background:${c}18;color:${c};border:1px solid ${c}">${inv.status.toUpperCase()}</div>
      <div class="ri-hint">${inv.hint||''}</div>
      <button class="ri-nav" onclick="event.stopPropagation();navTo(${inv.obf_lat},${inv.obf_lng})">🗺</button>
    </div>`;
  }).join('');
}

function focusInv(id){
  const inv=D.find(i=>i.id===id);
  if(!inv)return;
  map.setView([inv.obf_lat,inv.obf_lng],18);
  if(mk[id])mk[id].openPopup();
}

function navTo(lat,lng){
  const url=`https://maps.apple.com/?daddr=${lat},${lng}&dirflg=w`;
  window.open(url,'_blank');
}

// ── RANDO (TSP nearest neighbor) ──────────────────────────────────────────
function toggleRando(){
  randoOpen=!randoOpen;
  document.getElementById('rando-panel').style.display=randoOpen?'block':'none';
  document.getElementById('rando-btn').classList.toggle('active',randoOpen);
}

function calcRando(){
  if(myLat===null){alert('Active le GPS d\'abord');return;}
  const n=parseInt(document.getElementById('rando-n').value);
  const r=parseInt(document.getElementById('rando-r').value);
  
  // Filtrer les candidats
  const candidates=D.filter(inv=>inv.obf_lat&&inv.obf_lng&&!fl.has(inv.id)&&af.has(inv.status))
    .map(inv=>({...inv,dist:Math.round(haversine(myLat,myLng,inv.obf_lat,inv.obf_lng))}))
    .filter(inv=>inv.dist<=r)
    .sort((a,b)=>a.dist-b.dist)
    .slice(0,Math.min(n*3,60)); // pool élargi pour TSP
  
  if(candidates.length===0){
    document.getElementById('rando-route').innerHTML='<div style="font-size:10px;color:var(--destroyed);padding:8px">Aucun invader dans ce rayon</div>';
    document.getElementById('rando-route').style.display='block';
    return;
  }
  
  // TSP nearest neighbor depuis position actuelle
  const route=tspNN(myLat,myLng,candidates,n);
  displayRoute(route);
}

function tspNN(startLat,startLng,candidates,maxN){
  const visited=new Set();
  const route=[];
  let curLat=startLat,curLng=startLng;
  
  while(route.length<maxN&&visited.size<candidates.length){
    let best=null,bestDist=Infinity;
    candidates.forEach(inv=>{
      if(visited.has(inv.id))return;
      const d=haversine(curLat,curLng,inv.obf_lat,inv.obf_lng);
      if(d<bestDist){bestDist=d;best=inv;}
    });
    if(!best)break;
    visited.add(best.id);
    route.push({...best,leg:Math.round(bestDist)});
    curLat=best.obf_lat;curLng=best.obf_lng;
  }
  return route;
}

function displayRoute(route){
  // Supprimer ancienne route
  if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}
  
  if(route.length===0)return;
  
  // Tracer la route sur la carte
  const pts=[[myLat,myLng],...route.map(inv=>[inv.obf_lat,inv.obf_lng])];
  routeLayer=L.polyline(pts,{color:'rgba(0,255,204,.5)',weight:2,dashArray:'6,4'}).addTo(map);
  map.fitBounds(routeLayer.getBounds(),{padding:[30,30]});
  
  // Total distance
  const total=route.reduce((s,inv)=>s+inv.leg,0);
  
  // Afficher la liste
  const div=document.getElementById('rando-route');
  div.style.display='block';
  div.innerHTML=`
    <div style="font-size:10px;color:#555;padding:4px 0;margin-bottom:4px;border-bottom:1px solid #1a1a2e">
      ${route.length} stops · ~${total}m à pied · ~${Math.round(total/80)}min
    </div>
    ${route.map((inv,i)=>`
      <div class="rando-stop">
        <div class="rando-stop-num">${i+1}</div>
        <div class="rando-stop-id">${inv.id}</div>
        <div class="rando-stop-d">+${inv.leg}m</div>
        <button class="rando-stop-nav" onclick="navTo(${inv.obf_lat},${inv.obf_lng})">🗺</button>
        <button class="rando-stop-nav" onclick="focusInv('${inv.id}')">📍</button>
      </div>`).join('')}
    <button onclick="clearRoute()" style="width:100%;margin-top:6px;background:transparent;border:1px solid #252535;color:#555;font-family:'Share Tech Mono',monospace;font-size:10px;padding:4px;cursor:pointer;border-radius:2px;">✕ EFFACER ROUTE</button>
  `;
}

function clearRoute(){
  if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}
  document.getElementById('rando-route').style.display='none';
}

// ── STATS ────────────────────────────────────────────────────────────────
function showStats(){
  const panel=document.getElementById('stats-panel');
  panel.style.display='flex';
  renderStats();
}

function hideStats(){
  document.getElementById('stats-panel').style.display='none';
}

function renderStats(){
  const total=D.length;
  const flashedCount=fl.size;
  const pct=Math.round(flashedCount/total*100);
  
  // Stats globales
  const sg=document.getElementById('stats-global');
  sg.innerHTML=`
    <div class="sg-card">
      <div class="sg-val">${flashedCount}</div>
      <div class="sg-lbl">FLASHÉS</div>
      <div class="sg-bar"><div class="sg-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="sg-card">
      <div class="sg-val">${pct}%</div>
      <div class="sg-lbl">PROGRESSION</div>
      <div class="sg-bar"><div class="sg-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="sg-card">
      <div class="sg-val">${total-flashedCount}</div>
      <div class="sg-lbl">RESTANTS</div>
    </div>
    <div class="sg-card">
      <div class="sg-val">${total}</div>
      <div class="sg-lbl">TOTAL</div>
    </div>
  `;
  
  // Stats par arrondissement
  const byArr={};
  D.forEach(inv=>{
    if(!inv.obf_lat)return;
    const arr=geoArr(inv.obf_lat,inv.obf_lng)||0;
    if(!byArr[arr])byArr[arr]={total:0,flashed:0,OK:0,damaged:0,destroyed:0,hidden:0};
    byArr[arr].total++;
    byArr[arr][inv.status]=(byArr[arr][inv.status]||0)+1;
    if(fl.has(inv.id))byArr[arr].flashed++;
  });
  
  const sorted=Object.entries(byArr).sort((a,b)=>{
    const pa=a[1].flashed/a[1].total;const pb=b[1].flashed/b[1].total;
    return pb-pa;
  });
  
  const grid=document.getElementById('arr-grid');
  grid.innerHTML=sorted.map(([arr,s])=>{
    const p=Math.round(s.flashed/s.total*100);
    return `<div class="arr-card" onclick="focusArr(${arr})">
      <div class="arr-num">${arr?arr+'<sup>e</sup> ARR.':' ?'}</div>
      <div class="arr-prog">${s.flashed}/${s.total} · ${p}%</div>
      <div class="arr-bar"><div class="arr-bar-fill" style="width:${p}%"></div></div>
      <div class="arr-counts">
        <span style="color:#00ff88">${s.OK||0}✓</span>
        <span style="color:#ffaa00">${s.damaged||0}!</span>
        <span style="color:#ff3355">${s.destroyed||0}✗</span>
        <span style="color:#8888ff">${s.hidden||0}?</span>
      </div>
    </div>`;
  }).join('');
}

function focusArr(arr){
  hideStats();
  if(!arr)return;
  // Zoomer sur les invaders de cet arrondissement
  const invs=D.filter(inv=>inv.obf_lat&&geoArr(inv.obf_lat,inv.obf_lng)===arr);
  if(invs.length===0)return;
  const lats=invs.map(i=>i.obf_lat),lngs=invs.map(i=>i.obf_lng);
  map.fitBounds([[Math.min(...lats),Math.min(...lngs)],[Math.max(...lats),Math.max(...lngs)]],{padding:[20,20]});
}

// ── LISTE PANEL ───────────────────────────────────────────────────────────
let listFilters=new Set(['OK','damaged','destroyed','hidden']);
let listShowFlashed=true, listShowFlashedOnly=false, listArrFilter=null;

function showList(){
  document.getElementById('list-panel').style.display='flex';
  document.getElementById('list-btn').classList.add('active');
  buildArrChips();
  renderList();
}
function hideList(){
  document.getElementById('list-panel').style.display='none';
  document.getElementById('list-btn').classList.remove('active');
}
function toggleListFilter(btn){
  const st=btn.dataset.st;
  if(listFilters.has(st)){listFilters.delete(st);btn.classList.remove('active');}
  else{listFilters.add(st);btn.classList.add('active');}
  renderList();
}
function toggleListFlashed(btn){
  listShowFlashedOnly=false;
  listShowFlashed=!listShowFlashed;
  btn.classList.toggle('active',listShowFlashed);
  document.getElementById('lf-flash').classList.remove('active');
  renderList();
}
function toggleListFlashedOnly(btn){
  listShowFlashedOnly=!listShowFlashedOnly;
  btn.classList.toggle('active',listShowFlashedOnly);
  if(listShowFlashedOnly){listShowFlashed=true;document.getElementById('lf-nonflash').classList.add('active');}
  renderList();
}
function buildArrChips(){
  const row=document.getElementById('list-arr-row');
  const arrs=new Set();
  D.forEach(inv=>{if(inv.obf_lat)arrs.add(geoArr(inv.obf_lat,inv.obf_lng)||0);});
  const sorted=[...arrs].filter(a=>a).sort((a,b)=>a-b);
  row.innerHTML='<button class="la-chip active" data-arr="all" onclick="setArrFilter(this,null)">Tous</button>'
    +sorted.map(a=>`<button class="la-chip" data-arr="${a}" onclick="setArrFilter(this,${a})">${a}e</button>`).join('');
}
function setArrFilter(btn,arr){
  listArrFilter=arr;
  document.querySelectorAll('.la-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}
function renderList(){
  const q=(document.getElementById('list-search').value||'').toUpperCase().trim();
  const sort=document.getElementById('list-sort').value;
  
  let items=D.filter(inv=>{
    if(!inv.obf_lat) return false;
    if(!listFilters.has(inv.status)) return false;
    const isF=fl.has(inv.id);
    if(listShowFlashedOnly && !isF) return false;
    if(!listShowFlashed && isF) return false;
    if(listArrFilter && geoArr(inv.obf_lat,inv.obf_lng)!==listArrFilter) return false;
    if(q && !inv.id.includes(q) && !(inv.hint||'').toUpperCase().includes(q)) return false;
    return true;
  });
  
  // Sort
  items=items.map(inv=>({...inv,_arr:geoArr(inv.obf_lat,inv.obf_lng)||0,_dist:myLat?Math.round(haversine(myLat,myLng,inv.obf_lat,inv.obf_lng)):null}));
  if(sort==='id') items.sort((a,b)=>a.id.localeCompare(b.id));
  else if(sort==='arr') items.sort((a,b)=>a._arr-b._arr);
  else if(sort==='dist') items.sort((a,b)=>(a._dist||99999)-(b._dist||99999));
  else if(sort==='status'){const so={OK:0,damaged:1,destroyed:2,hidden:3};items.sort((a,b)=>so[a.status]-so[b.status]);}
  
  document.getElementById('list-count').textContent=`${items.length} cibles`;
  
  const c=C;
  document.getElementById('list-body').innerHTML=items.map(inv=>{
    const f=fl.has(inv.id);
    const col=c[inv.status]||'#00ffcc';
    return `<div class="li-row${f?' li-flashed':''}" onclick="focusFromList('${inv.id}')">
      <div class="li-id">${inv.id}</div>
      <div class="li-status" style="background:${col}18;color:${col};border:1px solid ${col}">${inv.status.toUpperCase()}</div>
      <div class="li-arr">${inv._arr?inv._arr+'e':' ?'}</div>
      <div class="li-hint">${inv.hint||'—'}</div>
      <div class="li-dist">${inv._dist!=null?inv._dist+'m':'—'}</div>
      <button class="li-flash${f?' fl':''}" onclick="event.stopPropagation();tflList('${inv.id}',this)">${f?'✓':'⚡'}</button>
    </div>`;
  }).join('')||'<div style="padding:20px;color:#333;font-size:12px">Aucun résultat</div>';
}
function focusFromList(id){
  hideList();
  const inv=D.find(i=>i.id===id);
  if(!inv)return;
  map.setView([inv.obf_lat,inv.obf_lng],18);
  setTimeout(()=>{if(mk[id])mk[id].openPopup();},300);
}
function tflList(id,btn){
  tfl(id,{textContent:'',classList:{remove:()=>{},add:()=>{}}});
  const isF=fl.has(id);
  btn.textContent=isF?'✓':'⚡';
  btn.classList.toggle('fl',isF);
  // Refresh row opacity
  const row=btn.closest('.li-row');
  if(row)row.classList.toggle('li-flashed',isF);
  document.getElementById('list-count').textContent=`${document.querySelectorAll('.li-row').length} cibles`;
}

// ── CHOROPLÈTHE ───────────────────────────────────────────────────────────
let choroOn=false, choroLayer=null;

// Approximate arrondissement polygons as Leaflet rectangles with offsets
const ARR_CENTERS={
  1:[48.860,2.347],2:[48.865,2.349],3:[48.862,2.356],4:[48.853,2.352],
  5:[48.851,2.347],6:[48.849,2.332],7:[48.856,2.317],8:[48.874,2.312],
  9:[48.876,2.337],10:[48.876,2.360],11:[48.859,2.379],12:[48.840,2.386],
  13:[48.831,2.362],14:[48.833,2.326],15:[48.841,2.300],16:[48.863,2.276],
  17:[48.884,2.310],18:[48.892,2.344],19:[48.882,2.382],20:[48.864,2.399]
};
const ARR_SIZE=0.012; // approx radius in degrees

function toggleChoro(){
  choroOn=!choroOn;
  document.getElementById('choro-btn').classList.toggle('active',choroOn);
  document.getElementById('choro-legend').style.display=choroOn?'block':'none';
  if(choroOn) drawChoro(); else clearChoro();
}
function clearChoro(){
  if(choroLayer){map.removeLayer(choroLayer);choroLayer=null;}
}
function pctColor(p){
  if(p>=75) return `rgba(0,255,136,${.25+p/200})`;
  if(p>=50) return `rgba(200,255,50,${.2+p/300})`;
  if(p>=20) return `rgba(255,170,0,${.25+p/300})`;
  return `rgba(255,51,85,${.2+p/200})`;
}
function drawChoro(){
  clearChoro();
  // Compute stats per arrondissement
  const byArr={};
  D.forEach(inv=>{
    if(!inv.obf_lat)return;
    const arr=geoArr(inv.obf_lat,inv.obf_lng);
    if(!arr)return;
    if(!byArr[arr])byArr[arr]={total:0,flashed:0};
    byArr[arr].total++;
    if(fl.has(inv.id))byArr[arr].flashed++;
  });
  
  const layers=[];
  Object.entries(ARR_CENTERS).forEach(([arr,center])=>{
    const s=byArr[parseInt(arr)];
    if(!s||s.total===0)return;
    const pct=Math.round(s.flashed/s.total*100);
    const fillColor=pctColor(pct);
    const r=L.rectangle([
      [center[0]-ARR_SIZE*.8,center[1]-ARR_SIZE],
      [center[0]+ARR_SIZE*.8,center[1]+ARR_SIZE]
    ],{
      fillColor,fillOpacity:1,
      color:fillColor.replace('rgba','rgba').replace(/[\d.]+\)$/,'0.8)'),
      weight:1,
      interactive:true
    });
    r.bindTooltip(`<b style="font-family:Orbitron,monospace;color:#00ffcc">${arr}e arr.</b><br>${s.flashed}/${s.total} · ${pct}%`,{sticky:true});
    r.on('click',()=>focusArr(parseInt(arr)));
    layers.push(r);
  });
  
  choroLayer=L.layerGroup(layers).addTo(map);
}

// ── EXPORT / IMPORT / RESET ───────────────────────────────────────────────
function ef(){
  const b=new Blob([JSON.stringify([...fl])],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='flashed.json';a.click();
}
function ifn(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const r=new FileReader();
    r.onload=ev=>{
      try{
        fl=new Set(JSON.parse(ev.target.result));
        localStorage.setItem('piv',JSON.stringify([...fl]));
        D.forEach(inv=>{if(mk[inv.id])mk[inv.id].setIcon(mi(inv.status,fl.has(inv.id)));});
        document.getElementById('fn').textContent=fl.size;
        alert(`${fl.size} invaders importés ✓`);
      }catch(e){alert('Fichier invalide');}
    };
    r.readAsText(e.target.files[0]);
  };
  inp.click();
}
function cf(){
  if(!confirm('Reset tous les invaders flashés ?'))return;
  fl.clear();localStorage.setItem('piv','[]');
  D.forEach(inv=>{if(mk[inv.id])mk[inv.id].setIcon(mi(inv.status,false));});
  document.getElementById('fn').textContent=0;
}
